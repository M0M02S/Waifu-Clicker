<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐼 Panda Spiel – Bambus füttern</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #c0e0c0 0%, #a0c0a0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }

        .game-card {
            max-width: 700px;
            width: 100%;
            background: #fef9e8;
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 30px rgba(0, 40, 0, 0.4), inset 0 2px 4px rgba(255, 255, 200, 0.6);
            padding: 30px 20px 30px 20px;
            border: 4px solid #6b4f3c;
            transition: 0.3s;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            letter-spacing: 2px;
            color: #2d4b2d;
            text-shadow: 3px 3px 0 #c0d080;
            margin-top: -10px;
            margin-bottom: 10px;
            font-weight: 800;
            word-break: break-word;
        }

        .panda-zone {
            background: #dcd0b0;
            border-radius: 100px 100px 60px 60px;
            border: 5px solid #8b6b4d;
            padding: 25px 15px 15px 15px;
            margin: 15px 0 30px 0;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: inset 0 -5px 0 #6b4f3c, 0 8px 0 #4d3a2b;
        }

        .panda-emoji {
            font-size: 7rem;
            line-height: 1;
            filter: drop-shadow(4px 8px 0 #3a2a1e);
            transform: scaleX(-1);
        }

        .speech-bubble {
            background: white;
            border-radius: 40px 40px 40px 10px;
            padding: 18px 25px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #2d4b2d;
            border: 4px solid #6b4f3c;
            box-shadow: 6px 6px 0 #3a5e3a;
            max-width: 300px;
            min-width: 200px;
            text-align: center;
            word-break: break-word;
        }

        .speech-bubble span {
            display: inline-block;
        }

        .bamboo-forest {
            background: #8b6b4d;
            border-radius: 60px;
            padding: 25px 15px;
            margin: 15px 0 25px;
            border: 4px solid #5e3e2b;
            box-shadow: inset 0 -3px 0 #3e2b1c;
        }

        .bamboo-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            flex-wrap: wrap;
        }

        .bamboo {
            font-size: 6rem;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease, filter 0.2s;
            user-select: none;
            filter: drop-shadow(2px 8px 0 #3a5e3a);
            transform: rotate(2deg);
        }

        .bamboo:hover {
            transform: scale(1.15) rotate(0deg);
            filter: drop-shadow(4px 10px 0 #2d4b2d);
        }

        .bamboo:active {
            transform: scale(0.95) rotate(-2deg);
            filter: drop-shadow(0 4px 0 #1e3a1e);
        }

        .bamboo.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
            filter: none;
            transition: opacity 0.3s, transform 0.3s;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ead5b5;
            border-radius: 50px;
            padding: 15px 25px;
            border: 4px solid #6b4f3c;
            margin: 20px 0 15px;
            font-weight: bold;
            font-size: 1.8rem;
            color: #1e3a1e;
            box-shadow: 0 6px 0 #4d3a2b;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-text {
            background: #2d4b2d;
            color: #f9f2d9;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 2rem;
            border: 3px solid #fedb7a;
            text-shadow: 2px 2px 0 #1e3a1e;
            box-shadow: inset 0 -2px 0 #0f1e0f;
        }

        .reset-btn {
            background: #ffcf8a;
            border: none;
            font-size: 2rem;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            color: #3a2a1e;
            border: 4px solid #b37b48;
            box-shadow: 0 7px 0 #8b5a2e, 0 8px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.07s linear;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .reset-btn:active {
            transform: translateY(7px);
            box-shadow: 0 0px 0 #8b5a2e, 0 5px 10px rgba(0,0,0,0.2);
        }

        .win-message {
            color: #c44b1e;
            font-size: 1.8rem;
            text-align: center;
            background: #ffecb3;
            border-radius: 40px;
            padding: 8px 20px;
            border: 3px dashed #c44b1e;
        }

        footer {
            text-align: center;
            color: #3d5e3d;
            font-size: 1.4rem;
            margin-top: 10px;
            font-style: italic;
            font-weight: 600;
            text-shadow: 1px 1px 0 #b0b07a;
        }
    </style>
</head>
<body>
    <div class="game-card">
        <h1>🐼 Panda Spiel</h1>

        <!-- Panda mit Sprechblase -->
        <div class="panda-zone">
            <div class="panda-emoji" aria-label="Panda">🐼</div>
            <div class="speech-bubble" id="pandaMessage">
                <span>😋 Ich habe Hunger!</span>
            </div>
        </div>

        <!-- Bambuswald – die drei Halme -->
        <div class="bamboo-forest">
            <div class="bamboo-row" id="bambooContainer">
                <div class="bamboo" data-index="0" aria-label="Bambus" role="button" tabindex="0">🎋</div>
                <div class="bamboo" data-index="1" aria-label="Bambus" role="button" tabindex="0">🎋</div>
                <div class="bamboo" data-index="2" aria-label="Bambus" role="button" tabindex="0">🎋</div>
            </div>
        </div>

        <!-- Punktestand + Reset -->
        <div class="score-panel">
            <div class="score-text" id="scoreDisplay">0 / 10</div>
            <button class="reset-btn" id="resetGameBtn" aria-label="Neustart">🔄 Neustart</button>
        </div>

        <!-- Kleine Statuszeile (wird bei Sieg sichtbar) -->
        <div id="winMessageContainer" style="min-height: 50px; text-align: center;"></div>

        <footer>🥬 Klick auf Bambus – fütter den Panda!</footer>
    </div>

    <script>
        (function() {
            // ---------- Spieleinstellungen ----------
            const MAX_SCORE = 10;
            let currentScore = 0;
            let gameActive = true;               // true = spiel läuft, false = victory (keine weiteren Aktionen)
            
            // DOM elemente
            const bambooElements = Array.from(document.querySelectorAll('.bamboo'));
            const scoreDisplay = document.getElementById('scoreDisplay');
            const pandaMessageBubble = document.querySelector('#pandaMessage span'); // das span innen
            const winContainer = document.getElementById('winMessageContainer');
            
            // Timeout-Verwaltung für jeden Bambus (3 Stück)
            let bambooTimeouts = [null, null, null];

            // ---------- lustige Panda-Sprüche (je nach Hunger) ----------
            const pandaPhrases = [
                "😩 Ich habe Hunger!",      // 0-2
                "😐 Lecker, mehr!",         // 3-5
                "🙂 Fast satt...",           // 6-8
                "🥰 Danke, ich bin satt!"    // 9-10 (ab 9)
            ];

            // Hilfsfunktion: Nachricht aktualisieren je nach Punktzahl
            function updatePandaMessage() {
                let msg = "";
                if (currentScore >= MAX_SCORE) {
                    msg = pandaPhrases[3] + " 🎉";
                } else if (currentScore >= 7) {        // 7,8,9
                    msg = pandaPhrases[2];
                } else if (currentScore >= 3) {        // 3,4,5,6
                    msg = pandaPhrases[1];
                } else {
                    msg = pandaPhrases[0];
                }
                pandaMessageBubble.textContent = msg;
            }

            // Anzeige von Punktestand & Sieg-Botschaft
            function updateScoreUI() {
                scoreDisplay.textContent = `${currentScore} / ${MAX_SCORE}`;
                
                // Zusätzliche Sieg-Meldung einblenden
                if (currentScore >= MAX_SCORE) {
                    winContainer.innerHTML = '<div class="win-message">🥳 Der Panda ist glücklich und satt! 🥳</div>';
                } else {
                    winContainer.innerHTML = ''; // leeren
                }
            }

            // Sieg-Modus aktivieren (wird einmal aufgerufen)
            function activateWinMode() {
                gameActive = false;

                // Alle laufenden Timeouts abbrechen (damit kein Bambus mehr auftaucht)
                for (let i = 0; i < bambooTimeouts.length; i++) {
                    if (bambooTimeouts[i]) {
                        clearTimeout(bambooTimeouts[i]);
                        bambooTimeouts[i] = null;
                    }
                }

                // Alle Bambusse sofort sichtbar machen (für den vollen Wald)
                bambooElements.forEach(b => b.classList.remove('hidden'));

                // Panda Nachricht und UI updaten
                updatePandaMessage();
                updateScoreUI();
            }

            // Punktestand erhöhen (durch Bambusklick)
            function increaseScore() {
                if (!gameActive) return;           // Sieg – keine Erhöhung mehr
                if (currentScore >= MAX_SCORE) return;

                currentScore++;
                
                // Prüfen ob maximale Punktzahl erreicht
                if (currentScore >= MAX_SCORE) {
                    activateWinMode();
                } else {
                    // Normales Update
                    updatePandaMessage();
                    updateScoreUI();
                }
            }

            // Handler für Bambus-Klick
            function onBambooClick(event) {
                const bamboo = event.currentTarget; // das jeweilige Bambus-div
                
                // Nur wenn Spiel aktiv, Bambus nicht versteckt und Punktestand noch nicht max
                if (!gameActive) return;
                if (currentScore >= MAX_SCORE) return;
                if (bamboo.classList.contains('hidden')) return; // Sicherheitshalber

                // Index ermitteln (data-index)
                const index = parseInt(bamboo.dataset.index, 10);

                // --- 1. Punktestand erhöhen ---
                increaseScore();  // hier wird ggf. activateWinMode ausgelöst

                // --- 2. Bambus verschwinden lassen (sofort) ---
                bamboo.classList.add('hidden');

                // --- 3. Vorherigen Timeout für diesen Bambus löschen (sollte keiner aktiv sein, aber sicher ist sicher) ---
                if (bambooTimeouts[index]) {
                    clearTimeout(bambooTimeouts[index]);
                    bambooTimeouts[index] = null;
                }

                // --- 4. Neuen Timeout starten: nach 1 Sekunde wieder sichtbar (nur wenn Spiel noch aktiv UND nicht bereits Sieg) ---
                bambooTimeouts[index] = setTimeout(() => {
                    // Wichtig: Nur sichtbar machen, wenn das Spiel noch aktiv ist (nicht im Sieg-Modus)
                    if (gameActive && currentScore < MAX_SCORE) {
                        bamboo.classList.remove('hidden');
                    } else {
                        // Falls das Spiel vorbei ist, aber Bambus versteckt blieb: nicht einblenden.
                        // (Im Win-Modus werden alle ohnehin sofort sichtbar gemacht, daher hier nichts tun)
                    }
                    bambooTimeouts[index] = null; // Referenz löschen
                }, 1000);
            }

            // ---------- Reset-Funktion ----------
            function resetGame() {
                // Alle laufenden Timeouts vernichten
                for (let i = 0; i < bambooTimeouts.length; i++) {
                    if (bambooTimeouts[i]) {
                        clearTimeout(bambooTimeouts[i]);
                        bambooTimeouts[i] = null;
                    }
                }

                // Alle Bambusse wieder sichtbar machen (hidden-Klasse entfernen)
                bambooElements.forEach(b => b.classList.remove('hidden'));

                // Punktestand zurücksetzen
                currentScore = 0;
                gameActive = true;

                // Panda-Sprüche & UI updaten
                updatePandaMessage();
                updateScoreUI();

                // Eventuell Sieg-Text entfernen
                winContainer.innerHTML = '';
            }

            // ---------- Event-Listener für Bambus ----------
            bambooElements.forEach((bamboo, idx) => {
                // data-index setzen (falls nicht schon im HTML)
                bamboo.dataset.index = idx;
                bamboo.addEventListener('click', onBambooClick);
                // kleine Tastaturbedienung
                bamboo.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        bamboo.click();
                    }
                });
            });

            // Reset-Knopf
            const resetBtn = document.getElementById('resetGameBtn');
            resetBtn.addEventListener('click', resetGame);

            // Initiale UI
            updatePandaMessage();
            updateScoreUI();

            // Kleine Dreingabe: falls jemand auf "Enter" im Reset-Button drückt – ist schon ok.
        })();
    </script>
</body>
</html>
