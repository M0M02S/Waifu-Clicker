<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ege's Panda Spiel 🐼</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #c0e0c0 0%, #a0c0a0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }

        .game-card {
            max-width: 750px;
            width: 100%;
            background: #fef9e8;
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 30px rgba(0, 40, 0, 0.4), inset 0 2px 4px rgba(255, 255, 200, 0.6);
            padding: 30px 20px 30px 20px;
            border: 4px solid #6b4f3c;
            transition: 0.3s;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            letter-spacing: 2px;
            color: #2d4b2d;
            text-shadow: 3px 3px 0 #c0d080;
            margin-top: -10px;
            margin-bottom: 10px;
            font-weight: 800;
            word-break: break-word;
        }

        .panda-zone {
            background: #dcd0b0;
            border-radius: 100px 100px 60px 60px;
            border: 5px solid #8b6b4d;
            padding: 25px 15px 15px 15px;
            margin: 15px 0 30px 0;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: inset 0 -5px 0 #6b4f3c, 0 8px 0 #4d3a2b;
        }

        .panda-emoji {
            font-size: 7rem;
            line-height: 1;
            filter: drop-shadow(4px 8px 0 #3a2a1e);
            transform: scaleX(-1);
            transition: transform 0.2s, filter 0.2s;
        }

        .speech-bubble {
            background: white;
            border-radius: 40px 40px 40px 10px;
            padding: 18px 25px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #2d4b2d;
            border: 4px solid #6b4f3c;
            box-shadow: 6px 6px 0 #3a5e3a;
            max-width: 350px;
            min-width: 250px;
            text-align: center;
            word-break: break-word;
        }

        .speech-bubble span {
            display: inline-block;
        }

        .bamboo-forest {
            background: #8b6b4d;
            border-radius: 60px;
            padding: 25px 15px;
            margin: 15px 0 25px;
            border: 4px solid #5e3e2b;
            box-shadow: inset 0 -3px 0 #3e2b1c;
        }

        .bamboo-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            flex-wrap: wrap;
        }

        .bamboo {
            font-size: 6rem;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease, filter 0.2s;
            user-select: none;
            filter: drop-shadow(2px 8px 0 #3a5e3a);
            transform: rotate(2deg);
        }

        .bamboo:hover {
            transform: scale(1.15) rotate(0deg);
            filter: drop-shadow(4px 10px 0 #2d4b2d);
        }

        .bamboo:active {
            transform: scale(0.95) rotate(-2deg);
            filter: drop-shadow(0 4px 0 #1e3a1e);
        }

        .bamboo.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
            filter: none;
            transition: opacity 0.3s, transform 0.3s;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ead5b5;
            border-radius: 50px;
            padding: 15px 25px;
            border: 4px solid #6b4f3c;
            margin: 20px 0 15px;
            font-weight: bold;
            font-size: 1.8rem;
            color: #1e3a1e;
            box-shadow: 0 6px 0 #4d3a2b;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-text {
            background: #2d4b2d;
            color: #f9f2d9;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 2rem;
            border: 3px solid #fedb7a;
            text-shadow: 2px 2px 0 #1e3a1e;
            box-shadow: inset 0 -2px 0 #0f1e0f;
        }

        .reset-btn {
            background: #ffcf8a;
            border: none;
            font-size: 2rem;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            color: #3a2a1e;
            border: 4px solid #b37b48;
            box-shadow: 0 7px 0 #8b5a2e, 0 8px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.07s linear;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .reset-btn:active {
            transform: translateY(7px);
            box-shadow: 0 0px 0 #8b5a2e, 0 5px 10px rgba(0,0,0,0.2);
        }

        .win-message {
            color: #c44b1e;
            font-size: 1.8rem;
            text-align: center;
            background: #ffecb3;
            border-radius: 40px;
            padding: 8px 20px;
            border: 3px dashed #c44b1e;
        }

        footer {
            text-align: center;
            color: #3d5e3d;
            font-size: 1.4rem;
            margin-top: 10px;
            font-style: italic;
            font-weight: 600;
            text-shadow: 1px 1px 0 #b0b07a;
        }
    </style>
</head>
<body>
    <div class="game-card">
        <h1>🐼 ege's Panda Spiel</h1>

        <!-- Panda ege mit Sprechblase -->
        <div class="panda-zone">
            <div class="panda-emoji" id="pandaEmoji" aria-label="Panda ege">🐼</div>
            <div class="speech-bubble" id="pandaMessage">
                <span id="messageText">ege: 😋 Ich habe Hunger!</span>
            </div>
        </div>

        <!-- Bambuswald – drei Halme -->
        <div class="bamboo-forest">
            <div class="bamboo-row" id="bambooContainer">
                <div class="bamboo" data-index="0" aria-label="Bambus" role="button" tabindex="0">🎋</div>
                <div class="bamboo" data-index="1" aria-label="Bambus" role="button" tabindex="0">🎋</div>
                <div class="bamboo" data-index="2" aria-label="Bambus" role="button" tabindex="0">🎋</div>
            </div>
        </div>

        <!-- Punktestand + Reset -->
        <div class="score-panel">
            <div class="score-text" id="scoreDisplay">0 / 100</div>
            <button class="reset-btn" id="resetGameBtn" aria-label="Neustart">🔄 Neustart</button>
        </div>

        <!-- Kleine Statuszeile (wird bei Explosion sichtbar) -->
        <div id="winMessageContainer" style="min-height: 50px; text-align: center;"></div>

        <footer>🥬 Klick auf Bambus – fütter ege, aber Vorsicht, er platzt bei 100!</footer>
    </div>

    <script>
        (function() {
            // ---------- Spieleinstellungen ----------
            const MAX_SCORE = 100;          // Bei 100 platzt ege
            const SATT_SCORE = 50;           // Ab 50 ist ege satt (andere Sprüche)
            let currentScore = 0;
            let gameActive = true;           

            // DOM elemente
            const bambooElements = Array.from(document.querySelectorAll('.bamboo'));
            const scoreDisplay = document.getElementById('scoreDisplay');
            const messageSpan = document.getElementById('messageText');
            const pandaEmoji = document.getElementById('pandaEmoji');
            const winContainer = document.getElementById('winMessageContainer');

            // Timeout-Verwaltung für jeden Bambus (3 Stück)
            let bambooTimeouts = [null, null, null];

            // ---------- lustige Panda-Sprüche (getrennt nach Zustand) ----------
            const hungryPhrases = [
                "😋 Ich habe Hunger!",
                "🎋 Bambus, bitte!",
                "🙏 Fütter mich!",
                "😩 Mampf, mampf!",
                "🍽️ Ich will Bambus!"
            ];

            const fullPhrases = [
                "😤 Es reicht!",
                "🤰 Ich bin satt!",
                "🛑 Hör auf!",
                "🙅 Kein Bambus mehr!",
                "💥 Ich platze gleich!"
            ];

            const explodedPhrase = "💥 BUMM! ege ist geplatzt!";

            // Hilfsfunktion: zufälligen Index aus Array
            function randomPhrase(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            // Aktualisiert Sprechblase, Emoji und ggf. Explosion
            function updatePandaMessage() {
                // Platzen?
                if (currentScore >= MAX_SCORE) {
                    // Explosion
                    pandaEmoji.textContent = "💥";
                    messageSpan.textContent = "ege: " + explodedPhrase;
                    winContainer.innerHTML = '<div class="win-message">😵 ege ist geplatzt! Neustart?</div>';
                } else {
                    // Normales Panda-Emoji
                    pandaEmoji.textContent = "🐼";
                    winContainer.innerHTML = ''; // leeren

                    let phrase = "";
                    if (currentScore >= SATT_SCORE) {
                        // satt-phase (50-99)
                        phrase = randomPhrase(fullPhrases);
                    } else {
                        // hungrig-phase (0-49)
                        phrase = randomPhrase(hungryPhrases);
                    }
                    messageSpan.textContent = "ege: " + phrase;
                }
            }

            // Anzeige von Punktestand
            function updateScoreUI() {
                scoreDisplay.textContent = `${currentScore} / ${MAX_SCORE}`;
            }

            // ---------- Explosion / Game Over ----------
            function explodePanda() {
                gameActive = false;

                // Alle laufenden Timeouts abbrechen (damit kein Bambus mehr auftaucht)
                for (let i = 0; i < bambooTimeouts.length; i++) {
                    if (bambooTimeouts[i]) {
                        clearTimeout(bambooTimeouts[i]);
                        bambooTimeouts[i] = null;
                    }
                }

                // Alle Bambusse sichtbar machen (für den finalen Anblick)
                bambooElements.forEach(b => b.classList.remove('hidden'));

                // Panda-Nachricht und Emoji updaten
                updatePandaMessage();  // setzt Emoji auf 💥 und Text
                updateScoreUI();
            }

            // Punktestand erhöhen (durch Bambusklick)
            function increaseScore() {
                if (!gameActive) return;           // Explosion – keine Erhöhung mehr
                if (currentScore >= MAX_SCORE) return;

                currentScore++;
                
                // Prüfen ob maximale Punktzahl erreicht (Platzen)
                if (currentScore >= MAX_SCORE) {
                    explodePanda();
                } else {
                    // Normales Update
                    updatePandaMessage();
                    updateScoreUI();
                }
            }

            // Handler für Bambus-Klick
            function onBambooClick(event) {
                const bamboo = event.currentTarget;

                if (!gameActive) return;
                if (currentScore >= MAX_SCORE) return;
                if (bamboo.classList.contains('hidden')) return;

                const index = parseInt(bamboo.dataset.index, 10);

                // Punktestand erhöhen (kann explode auslösen)
                increaseScore();  

                // Bambus verschwinden lassen (sofort)
                bamboo.classList.add('hidden');

                // Vorherigen Timeout für diesen Bambus löschen
                if (bambooTimeouts[index]) {
                    clearTimeout(bambooTimeouts[index]);
                    bambooTimeouts[index] = null;
                }

                // Neuen Timeout starten: nach 1 Sekunde wieder sichtbar (nur wenn Spiel aktiv und nicht explodiert)
                bambooTimeouts[index] = setTimeout(() => {
                    if (gameActive && currentScore < MAX_SCORE) {
                        bamboo.classList.remove('hidden');
                    } else {
                        // Wenn explodiert, bleibt er versteckt? Wir machen alle sichtbar in explode, also hier nichts.
                        // Aber falls ein Timeout nach dem Platzen noch ausgelöst wird (durch Race-Condition), 
                        // dann nicht einblenden, weil gameActive false ist.
                    }
                    bambooTimeouts[index] = null;
                }, 1000);
            }

            // ---------- Reset-Funktion ----------
            function resetGame() {
                // Alle laufenden Timeouts vernichten
                for (let i = 0; i < bambooTimeouts.length; i++) {
                    if (bambooTimeouts[i]) {
                        clearTimeout(bambooTimeouts[i]);
                        bambooTimeouts[i] = null;
                    }
                }

                // Alle Bambusse wieder sichtbar machen
                bambooElements.forEach(b => b.classList.remove('hidden'));

                // Punktestand zurücksetzen
                currentScore = 0;
                gameActive = true;

                // Panda-Emoji wieder normal
                pandaEmoji.textContent = "🐼";

                // Panda-Sprüche & UI updaten
                updatePandaMessage();
                updateScoreUI();

                // Eventuelle Explosionsmeldung entfernen
                winContainer.innerHTML = '';
            }

            // ---------- Event-Listener für Bambus ----------
            bambooElements.forEach((bamboo, idx) => {
                bamboo.dataset.index = idx;
                bamboo.addEventListener('click', onBambooClick);
                // kleine Tastaturbedienung
                bamboo.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        bamboo.click();
                    }
                });
            });

            // Reset-Knopf
            const resetBtn = document.getElementById('resetGameBtn');
            resetBtn.addEventListener('click', resetGame);

            // Initiale UI
            updatePandaMessage();
            updateScoreUI();
        })();
    </script>
</body>
</html>
