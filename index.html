<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waifu Clicker · detaillierte Waifu + Herzexplosion</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #f9d8e4 0%, #f2b2c5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            margin: 0;
            touch-action: manipulation;
        }

        .game-container {
            max-width: 620px;
            width: 100%;
            background: rgba(255, 240, 245, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 22px 18px 32px;
            box-shadow: 0 20px 40px rgba(150, 40, 80, 0.3), 0 4px 20px #ffb8d2;
            border: 3px solid rgba(255, 255, 255, 0.7);
        }

        h1 {
            text-align: center;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3c1421;
            text-shadow: 4px 4px 0 #ffc1d4, 6px 6px 0 rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
            word-break: break-word;
        }

        .points-panel {
            background: rgba(253, 227, 237, 0.8);
            border-radius: 80px;
            padding: 14px 20px;
            margin: 10px 0 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 3px solid white;
            box-shadow: inset 0 2px 10px #ffb6c1, 0 10px 10px rgba(130, 40, 70, 0.2);
        }

        .heart-display {
            font-size: 2.2rem;
            font-weight: bold;
            background: white;
            padding: 8px 26px;
            border-radius: 60px;
            color: #b23b5c;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 0 #b23b5c;
            flex: 1 1 auto;
            justify-content: center;
        }

        .heart-display span {
            font-size: 2.6rem;
            line-height: 1;
        }

        .stats {
            font-size: 1.5rem;
            background: #ffe6f0;
            padding: 8px 20px;
            border-radius: 40px;
            color: #811e3c;
            font-weight: 600;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-item i {
            font-size: 1.8rem;
        }

        /* WAIFU-BEREICH MIT HERZ-EFFEKT */
        .waifu-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 8px 0 20px;
            filter: drop-shadow(0 20px 12px #ac5779);
        }

        .waifu-button {
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            transition: transform 0.1s ease;
            touch-action: manipulation;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            max-width: 300px;
            width: 75vw;
            height: auto;
            aspect-ratio: 1/1;
            position: relative;
            z-index: 5;
        }

        .waifu-button:active {
            transform: scale(0.94);
        }

        /* Detailliertes Waifu-SVG */
        .waifu-svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            background: #ffe8f0;  /* zarter Hintergrund */
            box-shadow: 0 18px 0 #a13e5e, 0 0 0 6px white, 0 0 0 12px #ffb6d1;
        }

        /* Behälter für die fliegenden Herzen (über dem Button) */
        .heart-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            overflow: hidden;
            border-radius: 50%;
        }

        .heart-particle {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            animation: floatUp 1s ease-out forwards;
            filter: drop-shadow(0 4px 6px #ff99aa);
            pointer-events: none;
            will-change: transform, opacity;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.6);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-120px) scale(1.4);
                opacity: 0;
            }
        }

        /* Upgrades */
        .upgrades-title {
            font-size: 2rem;
            font-weight: 600;
            color: #3f1723;
            margin: 18px 0 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 220, 240, 0.7);
            padding: 8px 24px;
            border-radius: 50px;
            backdrop-filter: blur(2px);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }

        .upgrade-card {
            background: #fff0f5;
            border: 4px solid white;
            border-radius: 40px;
            padding: 22px 12px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 12px 0 #b23b5c, 0 8px 12px rgba(0,0,0,0.2);
            transition: all 0.05s linear;
            touch-action: manipulation;
        }

        .upgrade-card:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #b23b5c, 0 8px 12px rgba(0,0,0,0.1);
        }

        .upgrade-emoji {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 6px;
            filter: drop-shadow(2px 4px 4px #c06a8a);
        }

        .upgrade-name {
            font-size: 1.7rem;
            font-weight: 700;
            color: #2f1120;
            margin-bottom: 4px;
        }

        .upgrade-desc {
            font-size: 1.3rem;
            background: #ffdaec;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 600;
            color: #911f47;
            margin: 10px 0 4px;
        }

        .upgrade-price {
            font-size: 2rem;
            font-weight: 800;
            background: white;
            padding: 6px 24px;
            border-radius: 50px;
            margin: 12px 0 4px;
            color: #b23b5c;
            border: 2px solid #ff96b9;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .upgrade-price span {
            font-size: 2rem;
        }

        button.upgrade-btn {
            background: #ffacc7;
            border: none;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 14px 28px;
            margin-top: 10px;
            color: #2f0f1a;
            width: 100%;
            border: 3px solid white;
            box-shadow: 0 6px 0 #9f4465;
            transition: all 0.05s;
            touch-action: manipulation;
            cursor: pointer;
        }

        button.upgrade-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #9f4465;
        }

        button.upgrade-btn:disabled {
            opacity: 0.5;
            filter: grayscale(0.5);
            pointer-events: none;
            transform: none;
            box-shadow: 0 6px 0 #6b3b4b;
        }

        .footer-note {
            text-align: center;
            margin-top: 26px;
            color: #511e2e;
            font-weight: 600;
            font-size: 1.3rem;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .heart-display { font-size: 1.8rem; padding: 6px 14px; }
            .stats { font-size: 1.2rem; gap: 12px; }
            .upgrade-name { font-size: 1.4rem; }
            .upgrade-price { font-size: 1.6rem; padding: 4px 16px; }
            button.upgrade-btn { font-size: 1.5rem; padding: 10px 16px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <h1>🌸WAIFU CLICKER🌸</h1>

        <div class="points-panel">
            <div class="heart-display">
                <span>❤️</span>
                <span id="pointsDisplay">0</span>
            </div>
            <div class="stats">
                <div class="stat-item"><i class="fas fa-fingerprint"></i> <span id="perClickDisplay">1</span></div>
                <div class="stat-item"><i class="fas fa-clock"></i> <span id="perSecDisplay">0</span></div>
            </div>
        </div>

        <!-- WAIFU MIT HERZ-RAIN -->
        <div class="waifu-wrapper">
            <button class="waifu-button" id="waifuClickBtn">
                <!-- extrem detailliertes Waifu-SVG -->
                <svg class="waifu-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Hintergrundsanft (Round) -->
                    <circle cx="100" cy="100" r="98" fill="#FFE3F0" stroke="#FFB6C1" stroke-width="4"/>
                    
                    <!-- Haare – große Schleife + Pony + lange Strähnen -->
                    <path d="M70 40 Q100 15 130 40 L135 60 Q100 30 65 60 Z" fill="#4A2A1B" opacity="0.9"/>
                    <path d="M55 50 Q70 20 100 25 Q130 20 145 50 L140 70 Q110 35 60 70 Z" fill="#5C3A2A"/>
                    <!-- Linke lange Haarsträhne -->
                    <path d="M45 80 Q35 120 50 160 Q60 140 55 100 Q52 85 45 80" fill="#4A2A1B"/>
                    <!-- Rechte lange Haarsträhne -->
                    <path d="M155 80 Q165 120 150 160 Q140 140 145 100 Q148 85 155 80" fill="#4A2A1B"/>
                    
                    <!-- Ohren / seitliche Härchen -->
                    <circle cx="58" cy="80" r="10" fill="#FFDFC4"/>
                    <circle cx="142" cy="80" r="10" fill="#FFDFC4"/>
                    
                    <!-- Gesicht grundform (schon durch circle, aber hier betonen) -->
                    <circle cx="100" cy="100" r="70" fill="#FFDFC4" stroke="#FCC2D0" stroke-width="2"/>
                    
                    <!-- Augen – gross, glänzend, mit Wimpern -->
                    <ellipse cx="70" cy="85" rx="18" ry="22" fill="white" stroke="#3F2A1E" stroke-width="2"/>
                    <ellipse cx="130" cy="85" rx="18" ry="22" fill="white" stroke="#3F2A1E" stroke-width="2"/>
                    <!-- Iris + Pupille -->
                    <circle cx="70" cy="88" r="10" fill="#B45D48"/>
                    <circle cx="130" cy="88" r="10" fill="#B45D48"/>
                    <circle cx="67" cy="85" r="4" fill="#22100A"/>
                    <circle cx="127" cy="85" r="4" fill="#22100A"/>
                    <!-- Glanzlichter -->
                    <circle cx="64" cy="80" r="2.5" fill="white"/>
                    <circle cx="124" cy="80" r="2.5" fill="white"/>
                    <circle cx="74" cy="80" r="1.5" fill="white" opacity="0.8"/>
                    <circle cx="134" cy="80" r="1.5" fill="white" opacity="0.8"/>
                    <!-- Wimpern oben -->
                    <path d="M58 69 L48 56 L62 63" stroke="#3F2A1E" stroke-width="2.5" fill="none"/>
                    <path d="M142 69 L152 56 L138 63" stroke="#3F2A1E" stroke-width="2.5" fill="none"/>
                    
                    <!-- Mund – leicht geöffnetes Lächeln mit Zähnchen? -->
                    <path d="M85 120 Q100 138, 115 120" stroke="#B23B5C" stroke-width="5" fill="none" stroke-linecap="round"/>
                    <circle cx="100" cy="125" r="3" fill="#F98B9E" opacity="0.5"/>
                    
                    <!-- Röte Wangen -->
                    <circle cx="55" cy="105" r="14" fill="#F9A8B8" opacity="0.4"/>
                    <circle cx="145" cy="105" r="14" fill="#F9A8B8" opacity="0.4"/>
                    
                    <!-- Schleife im Haar (riesig) -->
                    <path d="M100 15 L85 0 L115 0 L100 15" fill="#FF80BF" stroke="white" stroke-width="3"/>
                    <ellipse cx="100" cy="25" rx="22" ry="12" fill="#FFA8D0" stroke="white" stroke-width="2"/>
                    <circle cx="100" cy="25" r="9" fill="#FF5C9E" stroke="white" stroke-width="2"/>
                    
                    <!-- Hals / Schultern andeuten -->
                    <rect x="90" y="150" width="20" height="18" fill="#FFDFC4" rx="8"/>
                    <!-- Kleid-Spitze -->
                    <path d="M70 168 L130 168 L120 190 L80 190 Z" fill="#F9ACBF" stroke="white" stroke-width="3"/>
                    
                    <!-- zarte Glitzer um die Augen -->
                    <circle cx="85" cy="75" r="3" fill="#FFECF0" opacity="0.8"/>
                    <circle cx="115" cy="75" r="3" fill="#FFECF0" opacity="0.8"/>
                </svg>
            </button>
            <!-- Behälter für Herz-Partikel (wird per JS befüllt) -->
            <div class="heart-rain" id="heartRainContainer"></div>
        </div>

        <!-- UPGRADES -->
        <div class="upgrades-title">
            <i class="fas fa-gift"></i>  Upgrades  <i class="fas fa-gift"></i>
        </div>
        <div class="upgrades-grid">
            <div class="upgrade-card" id="upgradeClickCard">
                <div class="upgrade-emoji">⚡💘</div>
                <div class="upgrade-name">Stärkere Liebe</div>
                <div class="upgrade-desc">+1❤️ pro Klick</div>
                <div class="upgrade-price"><span>❤️</span> <span id="clickPriceDisplay">20</span></div>
                <button class="upgrade-btn" id="buyClickUpgrade">Kaufen</button>
            </div>
            <div class="upgrade-card" id="upgradeAutoCard">
                <div class="upgrade-emoji">⏰💞</div>
                <div class="upgrade-name">Autolove</div>
                <div class="upgrade-desc">+1❤️/Sekunde</div>
                <div class="upgrade-price"><span>❤️</span> <span id="autoPriceDisplay">10</span></div>
                <button class="upgrade-btn" id="buyAutoUpgrade">Kaufen</button>
            </div>
        </div>

        <div class="footer-note">drück die Waifu – sie liebt dich!  (◕‿◕)💕</div>
    </div>

    <script>
        (function() {
            // --- Spielvariablen ---
            let points = 0;
            let pointsPerClick = 1;
            let autoClickerLevel = 0;       
            let clickUpgradeLevel = 0;       

            const BASE_CLICK_PRICE = 20;
            const BASE_AUTO_PRICE = 10;

            // UI-Elemente
            const pointsDisplay = document.getElementById('pointsDisplay');
            const perClickDisplay = document.getElementById('perClickDisplay');
            const perSecDisplay = document.getElementById('perSecDisplay');
            const clickPriceSpan = document.getElementById('clickPriceDisplay');
            const autoPriceSpan = document.getElementById('autoPriceDisplay');
            const waifuBtn = document.getElementById('waifuClickBtn');
            const buyClickBtn = document.getElementById('buyClickUpgrade');
            const buyAutoBtn = document.getElementById('buyAutoUpgrade');
            const heartContainer = document.getElementById('heartRainContainer');

            // --- Hilfsfunktionen Preise ---
            function getClickUpgradePrice() {
                return BASE_CLICK_PRICE * (clickUpgradeLevel + 1);
            }
            function getAutoUpgradePrice() {
                return BASE_AUTO_PRICE * (autoClickerLevel + 1);
            }

            // --- Herz-Partikel Effekt (8–12 Herzen pro Klick) ---
            function spawnHearts(amount = 10) {
                if (!heartContainer) return;
                const rect = heartContainer.getBoundingClientRect();
                const containerWidth = heartContainer.clientWidth;
                const containerHeight = heartContainer.clientHeight;
                for (let i = 0; i < amount; i++) {
                    const heart = document.createElement('div');
                    heart.className = 'heart-particle';
                    // Verschiedene Herz-Symbole
                    const hearts = ['❤️', '💖', '💗', '💓', '💕', '💞', '💘', '🌸'];
                    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    // Zufällige Startposition (um die Mitte herum)
                    const left = 40 + Math.random() * 20; // % (40% – 60% des Containers)
                    const top = 40 + Math.random() * 20;  // %
                    heart.style.left = left + '%';
                    heart.style.top = top + '%';
                    // Zufällige Animationsdauer zwischen 0.8s und 1.4s
                    const duration = 0.8 + Math.random() * 0.8;
                    heart.style.animation = `floatUp ${duration}s ease-out forwards`;
                    // Zufällige Größe
                    const size = 1.4 + Math.random() * 1.2;
                    heart.style.fontSize = (size * 1.2) + 'rem';
                    heartContainer.appendChild(heart);
                    // Entfernen nach Animationsende
                    setTimeout(() => {
                        if (heart.parentNode) heart.remove();
                    }, duration * 1200);
                }
            }

            // --- UI updaten ---
            function updateUI() {
                pointsDisplay.textContent = Math.floor(points);
                perClickDisplay.textContent = pointsPerClick;
                perSecDisplay.textContent = autoClickerLevel;
                clickPriceSpan.textContent = getClickUpgradePrice();
                autoPriceSpan.textContent = getAutoUpgradePrice();

                buyClickBtn.disabled = points < getClickUpgradePrice();
                buyAutoBtn.disabled = points < getAutoUpgradePrice();
            }

            // --- Klick auf Waifu ---
            function handleWaifuClick(e) {
                e.preventDefault();
                points += pointsPerClick;
                spawnHearts(8 + Math.floor(Math.random() * 6)); // 8-13 Herzen
                updateUI();
                if (navigator.vibrate) navigator.vibrate(20);
            }

            // --- Käufe ---
            function buyClickUpgrade() {
                const price = getClickUpgradePrice();
                if (points < price) return;
                points -= price;
                clickUpgradeLevel++;
                pointsPerClick++;
                if (navigator.vibrate) navigator.vibrate(30);
                updateUI();
            }

            function buyAutoUpgrade() {
                const price = getAutoUpgradePrice();
                if (points < price) return;
                points -= price;
                autoClickerLevel++;
                if (navigator.vibrate) navigator.vibrate(30);
                updateUI();
            }

            // --- Autoklicker-Tick ---
            function autoTick() {
                if (autoClickerLevel > 0) {
                    points += autoClickerLevel;
                    updateUI();
                }
            }

            // --- Event-Listener ---
            waifuBtn.addEventListener('click', handleWaifuClick);
            waifuBtn.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });

            buyClickBtn.addEventListener('click', buyClickUpgrade);
            buyAutoBtn.addEventListener('click', buyAutoUpgrade);

            // Touch-Geräte: Kein Zoom bei Doppeltipp
            [waifuBtn, buyClickBtn, buyAutoBtn].forEach(btn => {
                btn.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
            });

            // Intervall für Autoklicker
            setInterval(autoTick, 1000);

            // Initiale UI
            updateUI();

            // Kleine Verzierung: Beim ersten Laden ein paar Herzen als Willkommensgruß (optional)
            window.addEventListener('load', () => {
                setTimeout(() => spawnHearts(5), 300);
            });
        })();
    </script>
</body>
</html>
