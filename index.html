<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waifu Clicker · zucker süß & flüssig</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #ffe4ef 0%, #f5b8d0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            margin: 0;
            touch-action: manipulation; /* verhindert Doppeltipp-Zoom */
        }

        .game-container {
            max-width: 660px;
            width: 100%;
            background: rgba(255, 240, 250, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 70px;
            padding: 24px 18px 30px;
            box-shadow: 0 25px 40px rgba(170, 60, 100, 0.4), 0 4px 20px #ffb0c5;
            border: 3px solid rgba(255, 255, 255, 0.7);
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3e1423;
            text-shadow: 4px 4px 0 #ffb7cc, 7px 7px 0 rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .points-panel {
            background: rgba(253, 227, 237, 0.9);
            border-radius: 80px;
            padding: 16px 22px;
            margin: 12px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 3px solid white;
            box-shadow: inset 0 2px 10px #ffb6c1, 0 12px 12px rgba(140, 40, 70, 0.25);
        }

        .heart-display {
            font-size: 2.4rem;
            font-weight: bold;
            background: white;
            padding: 8px 28px;
            border-radius: 60px;
            color: #c1355c;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 0 #b23b5c;
            flex: 1 1 auto;
            justify-content: center;
        }

        .heart-display span {
            font-size: 3rem;
            line-height: 1;
        }

        .stats {
            font-size: 1.6rem;
            background: #ffe6f0;
            padding: 8px 24px;
            border-radius: 40px;
            color: #811e3c;
            font-weight: 600;
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-item i {
            font-size: 2rem;
        }

        /* WAIFU-BEREICH – MIT HERZEN */
        .waifu-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 10px 0 22px;
            filter: drop-shadow(0 24px 16px #a04f6e);
        }

        .waifu-button {
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            transition: transform 0.12s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            touch-action: manipulation;
            padding: 0;
            outline: none;
            max-width: 320px;
            width: 78vw;
            height: auto;
            aspect-ratio: 1/1;
            position: relative;
            z-index: 10;
        }

        .waifu-button:active {
            transform: scale(0.92);
        }

        /* ULTRA DETAILLIERTES, SUPER SÜSSES WAIFU-SVG */
        .waifu-svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffecf5, #ffc2d5);
            box-shadow: 0 18px 0 #a13e5e, 0 0 0 7px white, 0 0 0 14px #ffb6d9;
        }

        /* Herz-Container */
        .heart-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
            overflow: visible;
            border-radius: 50%;
        }

        .heart-particle {
            position: absolute;
            font-size: 2.4rem;
            opacity: 0;
            animation: floatHeart 1s ease-out forwards;
            filter: drop-shadow(0 6px 8px #ff3377);
            pointer-events: none;
            will-change: transform, opacity;
            text-shadow: 0 2px 5px white;
        }

        @keyframes floatHeart {
            0% {
                transform: translate(0, 0) scale(0.5) rotate(0deg);
                opacity: 1;
            }
            70% {
                opacity: 0.9;
            }
            100% {
                transform: translate(var(--dx, -30px), var(--dy, -100px)) scale(1.8) rotate(30deg);
                opacity: 0;
            }
        }

        /* Upgrades */
        .upgrades-title {
            font-size: 2.2rem;
            font-weight: 600;
            color: #3f1723;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 220, 240, 0.7);
            padding: 8px 28px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 18px;
            margin-top: 8px;
        }

        .upgrade-card {
            background: #fff0f5;
            border: 4px solid white;
            border-radius: 44px;
            padding: 22px 12px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 14px 0 #b23b5c, 0 10px 16px rgba(0,0,0,0.2);
            transition: all 0.06s linear;
            touch-action: manipulation;
        }

        .upgrade-card:active {
            transform: translateY(8px);
            box-shadow: 0 6px 0 #b23b5c, 0 10px 16px rgba(0,0,0,0.1);
        }

        .upgrade-emoji {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 4px;
            filter: drop-shadow(2px 4px 4px #b05979);
        }

        .upgrade-name {
            font-size: 1.9rem;
            font-weight: 700;
            color: #2f1120;
            margin-bottom: 4px;
        }

        .upgrade-desc {
            font-size: 1.4rem;
            background: #ffdaec;
            padding: 4px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: #911f47;
            margin: 10px 0 4px;
        }

        .upgrade-price {
            font-size: 2.2rem;
            font-weight: 800;
            background: white;
            padding: 6px 26px;
            border-radius: 50px;
            margin: 12px 0 4px;
            color: #b23b5c;
            border: 2px solid #ff96b9;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .upgrade-price span {
            font-size: 2.2rem;
        }

        button.upgrade-btn {
            background: #ffacc7;
            border: none;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: bold;
            padding: 14px 30px;
            margin-top: 12px;
            color: #2f0f1a;
            width: 100%;
            border: 3px solid white;
            box-shadow: 0 8px 0 #9f4465;
            transition: all 0.06s;
            touch-action: manipulation;
            cursor: pointer;
        }

        button.upgrade-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #9f4465;
        }

        button.upgrade-btn:disabled {
            opacity: 0.5;
            filter: grayscale(0.5);
            pointer-events: none;
            transform: none;
            box-shadow: 0 6px 0 #6b3b4b;
        }

        .footer-note {
            text-align: center;
            margin-top: 28px;
            color: #511e2e;
            font-weight: 600;
            font-size: 1.5rem;
        }

        @media (max-width: 500px) {
            h1 { font-size: 2.4rem; }
            .heart-display { font-size: 1.9rem; padding: 6px 18px; }
            .stats { font-size: 1.3rem; gap: 14px; }
            .upgrade-name { font-size: 1.5rem; }
            .upgrade-price { font-size: 1.8rem; padding: 4px 18px; }
            button.upgrade-btn { font-size: 1.7rem; padding: 10px 18px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <h1>🌸✨WAIFU CLICKER✨🌸</h1>

        <div class="points-panel">
            <div class="heart-display">
                <span>❤️</span>
                <span id="pointsDisplay">0</span>
            </div>
            <div class="stats">
                <div class="stat-item"><i class="fas fa-fingerprint"></i> <span id="perClickDisplay">1</span></div>
                <div class="stat-item"><i class="fas fa-clock"></i> <span id="perSecDisplay">0</span></div>
            </div>
        </div>

        <!-- WAIFU (Jetzt noch hübscher + Herz-Explosion) -->
        <div class="waifu-wrapper">
            <button class="waifu-button" id="waifuClickBtn">
                <!-- Extreme niedliche Waifu mit vielen Details -->
                <svg class="waifu-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="skinGrad" cx="70%" cy="30%" r="90%">
                            <stop offset="0%" stop-color="#FFEEDD"/>
                            <stop offset="80%" stop-color="#FCC6D3"/>
                        </radialGradient>
                        <linearGradient id="hairGrad" x1="30" y1="20" x2="170" y2="100">
                            <stop offset="0%" stop-color="#5C3A2A"/>
                            <stop offset="100%" stop-color="#3F2419"/>
                        </linearGradient>
                    </defs>
                    <!-- Hintergrund mit Glow -->
                    <circle cx="100" cy="100" r="98" fill="url(#skinGrad)" stroke="#FFB6C1" stroke-width="4"/>
                    
                    <!-- Haare – üppig, mit Strähnen und Seitenteil -->
                    <path d="M55 45 Q70 15 100 15 Q130 15 145 45 L140 70 Q110 30 60 70 Z" fill="url(#hairGrad)"/>
                    <path d="M48 70 Q35 110 60 155 Q80 140 70 100 Q65 80 48 70" fill="#4D2E1B" opacity="0.9"/>
                    <path d="M152 70 Q165 110 140 155 Q120 140 130 100 Q135 80 152 70" fill="#4D2E1B" opacity="0.9"/>
                    
                    <!-- Haarband mit Stern -->
                    <rect x="75" y="28" width="50" height="18" rx="9" fill="#FF9FCF" stroke="white" stroke-width="3"/>
                    <circle cx="100" cy="37" r="8" fill="#FFD700" stroke="white" stroke-width="2"/>
                    <text x="100" y="42" font-size="12" text-anchor="middle" fill="white" stroke="white" stroke-width="0.5">★</text>
                    
                    <!-- Ohren mit niedlichen Ohrringen -->
                    <circle cx="58" cy="85" r="12" fill="#FFDFC4"/>
                    <circle cx="142" cy="85" r="12" fill="#FFDFC4"/>
                    <circle cx="58" cy="90" r="4" fill="#FCC0D0" stroke="white" stroke-width="2"/>
                    <circle cx="142" cy="90" r="4" fill="#FCC0D0" stroke="white" stroke-width="2"/>
                    
                    <!-- Gesicht – weich und rund -->
                    <circle cx="100" cy="105" r="68" fill="#FFDFC4" stroke="#F6B0C0" stroke-width="2"/>
                    
                    <!-- AUGEN – riesig, glitzernd, mit Sternchen -->
                    <ellipse cx="68" cy="90" rx="20" ry="25" fill="white" stroke="#3F281C" stroke-width="3"/>
                    <ellipse cx="132" cy="90" rx="20" ry="25" fill="white" stroke="#3F281C" stroke-width="3"/>
                    <!-- Iris – hellbraun mit Herzform -->
                    <circle cx="68" cy="94" r="12" fill="#C79A6E"/>
                    <circle cx="132" cy="94" r="12" fill="#C79A6E"/>
                    <!-- Pupillen – groß -->
                    <circle cx="65" cy="92" r="6" fill="#1F120B"/>
                    <circle cx="129" cy="92" r="6" fill="#1F120B"/>
                    <!-- Glanzlichter – mehrere für Tiefe -->
                    <circle cx="61" cy="84" r="3" fill="white"/>
                    <circle cx="125" cy="84" r="3" fill="white"/>
                    <circle cx="72" cy="83" r="2" fill="white" opacity="0.9"/>
                    <circle cx="136" cy="83" r="2" fill="white" opacity="0.9"/>
                    <circle cx="68" cy="79" r="1.5" fill="white" opacity="0.8"/>
                    <circle cx="132" cy="79" r="1.5" fill="white" opacity="0.8"/>
                    <!-- Wimpern – lang und gebogen -->
                    <path d="M54 72 L40 56 L58 68" stroke="#3F2A1E" stroke-width="3" fill="none"/>
                    <path d="M146 72 L160 56 L142 68" stroke="#3F2A1E" stroke-width="3" fill="none"/>
                    
                    <!-- Mund – süßes, schüchternes Lächeln -->
                    <path d="M80 130 Q100 148, 120 130" stroke="#C44A6F" stroke-width="6" fill="none" stroke-linecap="round"/>
                    <!-- kleines Highlight auf der Lippe -->
                    <circle cx="98" cy="137" r="3" fill="#FFA5B4" opacity="0.7"/>
                    
                    <!-- Rouge – dezent, aber vorhanden -->
                    <circle cx="50" cy="115" r="18" fill="#FEA8B8" opacity="0.5"/>
                    <circle cx="150" cy="115" r="18" fill="#FEA8B8" opacity="0.5"/>
                    
                    <!-- Hals und Kleid mit Herzchen -->
                    <rect x="90" y="156" width="20" height="16" fill="#FFDFC4" rx="8"/>
                    <path d="M70 172 L130 172 L115 195 L85 195 Z" fill="#F697B9" stroke="white" stroke-width="4"/>
                    <text x="100" y="186" font-size="22" text-anchor="middle" fill="white" stroke="white" stroke-width="0.8">❤️</text>
                    
                    <!-- Zusätzliche Glitzersterne -->
                    <circle cx="85" cy="68" r="3" fill="#FFF9E6" opacity="0.9"/>
                    <circle cx="115" cy="68" r="3" fill="#FFF9E6" opacity="0.9"/>
                    <circle cx="40" cy="130" r="4" fill="#FFEEAA" opacity="0.7"/>
                    <circle cx="160" cy="130" r="4" fill="#FFEEAA" opacity="0.7"/>
                </svg>
            </button>
            <!-- Container für die fliegenden Herzen -->
            <div class="heart-rain" id="heartRainContainer"></div>
        </div>

        <!-- UPGRADES -->
        <div class="upgrades-title">
            <i class="fas fa-gift"></i>  Upgrades  <i class="fas fa-gift"></i>
        </div>
        <div class="upgrades-grid">
            <div class="upgrade-card" id="upgradeClickCard">
                <div class="upgrade-emoji">⚡💘</div>
                <div class="upgrade-name">Stärkere Liebe</div>
                <div class="upgrade-desc">+1❤️ pro Klick</div>
                <div class="upgrade-price"><span>❤️</span> <span id="clickPriceDisplay">20</span></div>
                <button class="upgrade-btn" id="buyClickUpgrade">Kaufen</button>
            </div>
            <div class="upgrade-card" id="upgradeAutoCard">
                <div class="upgrade-emoji">⏰💞</div>
                <div class="upgrade-name">Autolove</div>
                <div class="upgrade-desc">+1❤️/Sekunde</div>
                <div class="upgrade-price"><span>❤️</span> <span id="autoPriceDisplay">10</span></div>
                <button class="upgrade-btn" id="buyAutoUpgrade">Kaufen</button>
            </div>
        </div>

        <div class="footer-note">💕 klick die Waifu – Regen aus Herzen 💕</div>
    </div>

    <script>
        (function() {
            // --- Spielzustand ---
            let points = 0;
            let pointsPerClick = 1;
            let autoClickerLevel = 0;       
            let clickUpgradeLevel = 0;       

            const BASE_CLICK_PRICE = 20;
            const BASE_AUTO_PRICE = 10;

            // UI Elemente
            const pointsDisplay = document.getElementById('pointsDisplay');
            const perClickDisplay = document.getElementById('perClickDisplay');
            const perSecDisplay = document.getElementById('perSecDisplay');
            const clickPriceSpan = document.getElementById('clickPriceDisplay');
            const autoPriceSpan = document.getElementById('autoPriceDisplay');
            const waifuBtn = document.getElementById('waifuClickBtn');
            const buyClickBtn = document.getElementById('buyClickUpgrade');
            const buyAutoBtn = document.getElementById('buyAutoUpgrade');
            const heartContainer = document.getElementById('heartRainContainer');

            // --- Preisberechnung ---
            function getClickUpgradePrice() {
                return BASE_CLICK_PRICE * (clickUpgradeLevel + 1);
            }
            function getAutoUpgradePrice() {
                return BASE_AUTO_PRICE * (autoClickerLevel + 1);
            }

            // --- Herz-Partikel mit Überlastschutz (max. 80 gleichzeitig) ---
            function spawnHearts(count = 10) {
                if (!heartContainer) return;
                // Wenn schon zu viele Partikel vorhanden, überspringe (verhindert Ruckeln)
                if (heartContainer.children.length > 80) return;

                for (let i = 0; i < count; i++) {
                    const heart = document.createElement('div');
                    heart.className = 'heart-particle';
                    // Verschiedene Herzsymbole + Glitzer
                    const hearts = ['❤️', '💖', '💗', '💓', '💕', '💞', '💘', '🌸', '✨', '💫'];
                    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    
                    // zufällige Startposition (um die Mitte herum)
                    const left = 35 + Math.random() * 30; // %
                    const top = 35 + Math.random() * 30; 
                    heart.style.left = left + '%';
                    heart.style.top = top + '%';
                    
                    // zufällige Flugrichtung (dx, dy) via CSS-Variablen
                    const dx = (Math.random() - 0.5) * 100; // -50px bis 50px
                    const dy = -60 - Math.random() * 80;    // immer nach oben
                    heart.style.setProperty('--dx', dx + 'px');
                    heart.style.setProperty('--dy', dy + 'px');
                    
                    // zufällige Dauer zwischen 0.8s und 1.5s
                    const duration = 0.8 + Math.random() * 0.9;
                    heart.style.animation = `floatHeart ${duration}s ease-out forwards`;
                    
                    // zufällige Größe
                    const size = 1.6 + Math.random() * 1.5;
                    heart.style.fontSize = (size * 0.8) + 'rem';
                    
                    heartContainer.appendChild(heart);
                    
                    // Entfernen nach Ende der Animation
                    setTimeout(() => {
                        if (heart.parentNode) heart.remove();
                    }, duration * 1200);
                }
            }

            // --- UI aktualisieren ---
            function updateUI() {
                pointsDisplay.textContent = Math.floor(points);
                perClickDisplay.textContent = pointsPerClick;
                perSecDisplay.textContent = autoClickerLevel;
                clickPriceSpan.textContent = getClickUpgradePrice();
                autoPriceSpan.textContent = getAutoUpgradePrice();

                buyClickBtn.disabled = points < getClickUpgradePrice();
                buyAutoBtn.disabled = points < getAutoUpgradePrice();
            }

            // --- Waifu Klick (nur noch ein Event – sauber) ---
            function handleWaifuClick(e) {
                e.preventDefault();
                // Punkte erhöhen
                points += pointsPerClick;
                // Herzen sprühen (8–14 Stück)
                spawnHearts(8 + Math.floor(Math.random() * 7));
                // UI aktualisieren
                updateUI();
                // Kurzes Vibration-Feedback
                if (navigator.vibrate) navigator.vibrate(20);
            }

            // --- Käufe ---
            function buyClickUpgrade() {
                const price = getClickUpgradePrice();
                if (points < price) return;
                points -= price;
                clickUpgradeLevel++;
                pointsPerClick++;
                if (navigator.vibrate) navigator.vibrate(30);
                updateUI();
            }

            function buyAutoUpgrade() {
                const price = getAutoUpgradePrice();
                if (points < price) return;
                points -= price;
                autoClickerLevel++;
                if (navigator.vibrate) navigator.vibrate(30);
                updateUI();
            }

            // --- Autoklicker ---
            function autoTick() {
                if (autoClickerLevel > 0) {
                    points += autoClickerLevel;
                    updateUI();
                }
            }

            // --- Event-Listener (NUR click – sauber und zuverlässig) ---
            waifuBtn.addEventListener('click', handleWaifuClick);
            // Touch-Geräte: nur touchstart mit preventDefault, um Zoom zu vermeiden – click wird trotzdem ausgelöst
            waifuBtn.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });

            buyClickBtn.addEventListener('click', buyClickUpgrade);
            buyAutoBtn.addEventListener('click', buyAutoUpgrade);

            // Auch bei den Kaufbuttons Touch-Konflikte vermeiden
            [buyClickBtn, buyAutoBtn].forEach(btn => {
                btn.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
            });

            // Intervall für Autoklicker
            setInterval(autoTick, 1000);

            // UI initialisieren
            updateUI();

            // Willkommensherzen
            window.addEventListener('load', () => {
                setTimeout(() => spawnHearts(10), 200);
            });
        })();
    </script>
</body>
</html>
