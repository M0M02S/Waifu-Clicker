<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kaskaden-Pop · Suchtspiel</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2634 0%, #0e1419 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 24px 16px 32px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            padding: 0 8px 20px 8px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }
        .score-box {
            background: #2a3744;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: bold;
            font-size: 1.5rem;
            color: #ffd966;
            box-shadow: inset 0 -3px 0 #0f1419, 0 8px 0 #0b0f12;
            transform: translateY(-2px);
            letter-spacing: 1px;
        }
        .highscore-box {
            background: #2a3744;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #a0c4ff;
            box-shadow: inset 0 -3px 0 #0f1419, 0 6px 0 #0b0f12;
            transform: translateY(-2px);
        }
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            background: #10161c;
            border-radius: 36px;
            padding: 18px;
            box-shadow: inset 0 0 0 2px #2e3b48, 0 18px 25px -8px black;
        }
        canvas {
            width: 100%;
            aspect-ratio: 1/1;
            display: block;
            border-radius: 24px;
            background: #1e2a32;
            box-shadow: 0 0 0 3px #3e4f5e, 0 15px 25px rgba(0,0,0,0.7);
            touch-action: none;  /* verhindert Scrollen/Pannen */
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
        }
        .gameover-badge {
            background: #c92a2a;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            padding: 8px 24px;
            border-radius: 40px;
            box-shadow: 0 6px 0 #7a1f1f;
            letter-spacing: 1px;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .gameover-badge.show {
            visibility: visible;
            opacity: 1;
        }
        .newgame-btn {
            background: #4c9aff;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 12px 32px;
            border-radius: 50px;
            box-shadow: 0 9px 0 #1f4a8a, 0 6px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 1px;
            touch-action: manipulation;
            cursor: pointer;
        }
        .newgame-btn:active {
            transform: translateY(6px);
            box-shadow: 0 3px 0 #1f4a8a;
        }
        .footer-note {
            color: #6b7f8f;
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="highscore-box" id="highscoreDisplay">🏆 0</div>
        <div class="score-box" id="scoreDisplay">💰 0</div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <div class="info-panel">
        <div class="gameover-badge" id="gameoverBadge">GAME OVER</div>
        <button class="newgame-btn" id="restartBtn">↻ Neustart</button>
    </div>
    <div class="footer-note">
        Tippe auf eine Gruppe (≥2 gleiche) – sie explodiert!<br>Je größer die Gruppe, desto mehr Punkte.
    </div>
</div>
<script>
    (function() {
        // -------------------- SPIELKONFIGURATION --------------------
        const ROWS = 8;
        const COLS = 8;
        const COLORS = [
            '#FF4136', // rot
            '#2ECC40', // grün
            '#0074D9', // blau
            '#FF851B', // orange
            '#F012BE', // pink
            '#FFDC00'  // gelb
        ];
        const BASE_POINTS = 10; // (Gruppengröße^2) * BASE_POINTS

        // -------------------- GLOBALE VARIABLEN --------------------
        let grid = [];                 // 2D-Array mit Farb-Indizes (0..5)
        let currentScore = 0;
        let highScore = 0;
        let gameOver = false;

        // DOM-Elemente
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highscoreDisplay = document.getElementById('highscoreDisplay');
        const gameoverBadge = document.getElementById('gameoverBadge');
        const restartBtn = document.getElementById('restartBtn');

        // Hilfsvariable, um Mehrfach-Taps während Verarbeitung zu vermeiden
        let processing = false;

        // -------------------- INITIALISIERUNG --------------------
        function initGrid() {
            // Zufällige Befüllung (0..COLORS.length-1)
            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    grid[r][c] = Math.floor(Math.random() * COLORS.length);
                }
            }
            // Sicherstellen, dass mindestens eine Gruppe (>=2) existiert
            if (!hasAnyMove()) {
                // Erzwinge eine Gruppe: setze zwei benachbarte Zellen auf gleiche Farbe
                const forcedRow = Math.floor(Math.random() * ROWS);
                const forcedCol = Math.floor(Math.random() * (COLS - 1)); // nicht letzte Spalte
                const randomColor = Math.floor(Math.random() * COLORS.length);
                grid[forcedRow][forcedCol] = randomColor;
                grid[forcedRow][forcedCol + 1] = randomColor;
            }
        }

        // -------------------- HILFSFUNKTIONEN FÜR GRUPPEN --------------------
        // Gibt alle Zellen einer zusammenhängenden Gruppe mit gleicher Farbe zurück (inkl. Startzelle)
        function getGroup(row, col) {
            if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return [];
            const targetColor = grid[row][col];
            if (targetColor === null || targetColor === undefined) return [];

            const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
            const group = [];
            const stack = [[row, col]];

            while (stack.length) {
                const [r, c] = stack.pop();
                if (visited[r][c]) continue;
                if (grid[r][c] !== targetColor) continue;

                visited[r][c] = true;
                group.push([r, c]);

                // Nachbarn (oben, unten, links, rechts)
                if (r > 0) stack.push([r - 1, c]);
                if (r < ROWS - 1) stack.push([r + 1, c]);
                if (c > 0) stack.push([r, c - 1]);
                if (c < COLS - 1) stack.push([r, c + 1]);
            }
            return group;
        }

        // Entfernt eine Gruppe (setzt Zellen auf "null") und gibt die Anzahl der entfernten Zellen zurück
        function removeGroup(group) {
            if (!group || group.length < 2) return 0;
            for (let [r, c] of group) {
                grid[r][c] = null;  // Markierung als gelöscht
            }
            return group.length;
        }

        // Lässt Blöcke nach unten fallen und füllt neue von oben auf
        function applyGravity() {
            for (let c = 0; c < COLS; c++) {
                // Spalte als Array auslesen
                let column = [];
                for (let r = 0; r < ROWS; r++) {
                    if (grid[r][c] !== null) {
                        column.push(grid[r][c]);
                    }
                }
                // Fehlende Zellen oben mit zufälligen Farben auffüllen
                while (column.length < ROWS) {
                    column.unshift(Math.floor(Math.random() * COLORS.length)); // neue Farbe von oben
                }
                // Spalte zurückschreiben
                for (let r = 0; r < ROWS; r++) {
                    grid[r][c] = column[r];
                }
            }
        }

        // Prüft, ob es noch eine verwertbare Gruppe (Größe >=2) gibt
        function hasAnyMove() {
            const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === null) continue;
                    if (!visited[r][c]) {
                        const group = getGroup(r, c);
                        if (group.length >= 2) {
                            return true;
                        }
                        // Alle Zellen dieser Gruppe als besucht markieren (um Wiederholung zu vermeiden)
                        for (let [gr, gc] of group) {
                            visited[gr][gc] = true;
                        }
                    }
                }
            }
            return false;
        }

        // -------------------- PUNKTE & HIGHSCORE --------------------
        function addPoints(groupSize) {
            const points = groupSize * groupSize * BASE_POINTS;
            currentScore += points;
            if (currentScore > highScore) {
                highScore = currentScore;
                localStorage.setItem('kaskadenPop_highscore', highScore);
            }
            updateUI();
        }

        function updateUI() {
            scoreDisplay.innerText = `💰 ${currentScore}`;
            highscoreDisplay.innerText = `🏆 ${highScore}`;
        }

        function loadHighScore() {
            const saved = localStorage.getItem('kaskadenPop_highscore');
            if (saved) highScore = parseInt(saved, 10) || 0;
            updateUI();
        }

        // -------------------- SPIEL-LOGIK BEI TAP --------------------
        function handleTap(clientX, clientY) {
            if (gameOver || processing) return;

            // Canvas-Koordinaten ermitteln
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;   // canvas interne Auflösung 400px
            const scaleY = canvas.height / rect.height;

            // relative Position im Canvas (0..400)
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;

            if (canvasX < 0 || canvasX >= canvas.width || canvasY < 0 || canvasY >= canvas.height) return;

            // Zellenkoordinaten (0..ROWS-1)
            const col = Math.floor(canvasX / (canvas.width / COLS));
            const row = Math.floor(canvasY / (canvas.height / ROWS));

            if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
            if (grid[row][col] === null) return; // eigentlich nie null, aber sicherheitshalber

            processing = true;

            // Gruppe holen
            const group = getGroup(row, col);
            if (group.length >= 2) {
                // Gruppe entfernen (setzt Zellen auf null)
                const removedCount = removeGroup(group);
                if (removedCount > 0) {
                    addPoints(removedCount);
                    // Schwerkraft anwenden
                    applyGravity();

                    // Prüfen, ob noch Züge möglich
                    if (!hasAnyMove()) {
                        gameOver = true;
                        gameoverBadge.classList.add('show');
                    } else {
                        // Spiel läuft weiter
                    }
                }
            }

            // Alles neu zeichnen
            drawCanvas();

            processing = false;
        }

        // -------------------- ZEICHNEN --------------------
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cellW = canvas.width / COLS;
            const cellH = canvas.height / ROWS;

            // Hintergrund-Raster zeichnen (Gitternetz)
            ctx.strokeStyle = '#3f5566';
            ctx.lineWidth = 1.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellW, 0);
                ctx.lineTo(i * cellW, canvas.height);
                ctx.strokeStyle = '#2f3f4f';
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * cellH);
                ctx.lineTo(canvas.width, i * cellH);
                ctx.strokeStyle = '#2f3f4f';
                ctx.stroke();
            }

            // Blöcke zeichnen
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === null) continue; // sollte nicht vorkommen, da wir nach gravity keine null haben

                    const colorIndex = grid[r][c];
                    ctx.fillStyle = COLORS[colorIndex % COLORS.length];
                    ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    ctx.shadowBlur = 8;
                    ctx.shadowOffsetX = 3;
                    ctx.shadowOffsetY = 3;

                    // Abgerundete Blöcke mit etwas Rand
                    const x = c * cellW + 3;
                    const y = r * cellH + 3;
                    const w = cellW - 6;
                    const h = cellH - 6;
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, 10);
                    ctx.fill();

                    // Kleiner Glanzpunkt (für 3D-Effekt)
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.beginPath();
                    ctx.roundRect(x+2, y+2, w-4, 4, 4);
                    ctx.fill();
                }
            }

            // Bei Game Over eine halbtransparente Schicht
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 28px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 14;
                ctx.fillText('⏹', canvas.width/2, canvas.height/2-10);
                ctx.font = 'bold 20px sans-serif';
                ctx.fillText('Game Over', canvas.width/2, canvas.height/2+30);
                ctx.shadowBlur = 0;
            }
        }

        // Helper für abgerundete Rechtecke
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        // -------------------- EVENT LISTENER (TOUCH & MOUSE) --------------------
        function setupEvents() {
            // Touch-Events
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault(); // verhindert Scrollen
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    handleTap(touch.clientX, touch.clientY);
                }
            }, { passive: false });

            // Maus-Events für Entwicklung am PC
            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                handleTap(e.clientX, e.clientY);
            });
        }

        // -------------------- NEUSTART --------------------
        function restartGame() {
            initGrid();
            currentScore = 0;
            gameOver = false;
            gameoverBadge.classList.remove('show');
            updateUI();
            drawCanvas();
        }

        // -------------------- START --------------------
        function startGame() {
            loadHighScore();
            initGrid();
            drawCanvas();
            setupEvents();

            restartBtn.addEventListener('click', (e) => {
                e.preventDefault();
                restartGame();
            });
        }

        // Alles initialisieren, sobald DOM bereit
        window.addEventListener('DOMContentLoaded', startGame);
    })();
</script>
</body>
</html>
