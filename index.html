<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ege's Panda – 100 Bambus</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #c0e0c0 0%, #a0c0a0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
        }

        .game-card {
            max-width: 750px;
            width: 100%;
            background: #fef9e8;
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 30px rgba(0, 40, 0, 0.4), inset 0 2px 4px rgba(255, 255, 200, 0.6);
            padding: 30px 20px;
            border: 4px solid #6b4f3c;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            color: #2d4b2d;
            text-shadow: 3px 3px 0 #c0d080;
            margin: -10px 0 10px;
            font-weight: 800;
        }

        .panda-zone {
            background: #dcd0b0;
            border-radius: 100px 100px 60px 60px;
            border: 5px solid #8b6b4d;
            padding: 25px 15px 15px;
            margin: 15px 0 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: inset 0 -5px 0 #6b4f3c, 0 8px 0 #4d3a2b;
        }

        .panda-emoji {
            font-size: 7rem;
            line-height: 1;
            filter: drop-shadow(4px 8px 0 #3a2a1e);
            transform: scaleX(-1);
            transition: 0.2s;
        }

        .speech-bubble {
            background: white;
            border-radius: 40px 40px 40px 10px;
            padding: 18px 25px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #2d4b2d;
            border: 4px solid #6b4f3c;
            box-shadow: 6px 6px 0 #3a5e3a;
            max-width: 380px;
            min-width: 260px;
            text-align: center;
        }

        .bamboo-forest {
            background: #8b6b4d;
            border-radius: 60px;
            padding: 25px 15px;
            margin: 15px 0 25px;
            border: 4px solid #5e3e2b;
            box-shadow: inset 0 -3px 0 #3e2b1c;
        }

        .bamboo-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            flex-wrap: wrap;
        }

        .bamboo {
            font-size: 6rem;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            filter: drop-shadow(2px 8px 0 #3a5e3a);
            transform: rotate(2deg);
            user-select: none;
        }

        .bamboo:hover {
            transform: scale(1.15) rotate(0deg);
            filter: drop-shadow(4px 10px 0 #2d4b2d);
        }

        .bamboo:active {
            transform: scale(0.95) rotate(-2deg);
        }

        .bamboo.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
            transition: opacity 0.3s, transform 0.3s;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ead5b5;
            border-radius: 50px;
            padding: 15px 25px;
            border: 4px solid #6b4f3c;
            margin: 20px 0 15px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1e3a1e;
            box-shadow: 0 6px 0 #4d3a2b;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-text {
            background: #2d4b2d;
            color: #f9f2d9;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 2rem;
            border: 3px solid #fedb7a;
            text-shadow: 2px 2px 0 #1e3a1e;
        }

        .reset-btn {
            background: #ffcf8a;
            border: none;
            font-size: 2rem;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            color: #3a2a1e;
            border: 4px solid #b37b48;
            box-shadow: 0 7px 0 #8b5a2e;
            cursor: pointer;
            transition: 0.07s linear;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .reset-btn:active {
            transform: translateY(7px);
            box-shadow: none;
        }

        .win-message {
            color: #c44b1e;
            font-size: 1.8rem;
            text-align: center;
            background: #ffecb3;
            border-radius: 40px;
            padding: 8px 20px;
            border: 3px dashed #c44b1e;
        }

        footer {
            text-align: center;
            color: #3d5e3d;
            font-size: 1.4rem;
            font-style: italic;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="game-card">
        <h1>🐼 ege's Panda</h1>

        <!-- Panda ege -->
        <div class="panda-zone">
            <div class="panda-emoji" id="pandaEmoji">🐼</div>
            <div class="speech-bubble" id="pandaMessage">
                <span id="messageText">ege: 😃 Hey, ich bin ege! Fütter mich!</span>
            </div>
        </div>

        <!-- Drei Bambus-Stücke -->
        <div class="bamboo-forest">
            <div class="bamboo-row" id="bambooContainer">
                <div class="bamboo" data-index="0" tabindex="0" role="button">🎋</div>
                <div class="bamboo" data-index="1" tabindex="0" role="button">🎋</div>
                <div class="bamboo" data-index="2" tabindex="0" role="button">🎋</div>
            </div>
        </div>

        <!-- Punktestand und Reset -->
        <div class="score-panel">
            <div class="score-text" id="scoreDisplay">0 / 100</div>
            <button class="reset-btn" id="resetGameBtn">🔄 Neustart</button>
        </div>

        <!-- Platz für Explosionsmeldung -->
        <div id="winMessageContainer" style="min-height: 50px; text-align: center;"></div>

        <footer>🥬 Klick auf Bambus – ege spricht nur alle 10 Stück</footer>
    </div>

    <script>
        (function() {
            // ---------- Konstanten ----------
            const MAX_SCORE = 100;
            const SATT_SCORE = 50;   // ab hier ist er satt (andere Sprüche)
            let currentScore = 0;
            let gameActive = true;
            let lastMilestone = -1;   // letzter Zehner-Meilenstein, bei dem wir eine Nachricht gezeigt haben

            // DOM-Elemente
            const bambooElements = Array.from(document.querySelectorAll('.bamboo'));
            const pandaEmoji = document.getElementById('pandaEmoji');
            const messageSpan = document.getElementById('messageText');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const winContainer = document.getElementById('winMessageContainer');

            // Timeouts für Bambus-Wiedererscheinen
            let bambooTimeouts = [null, null, null];

            // ---------- Nachricht je nach Meilenstein ----------
            function getMessageForMilestone(score) {
                if (score >= 100) {
                    return "ege: 💥 BUMM! ege ist geplatzt!";
                }
                if (score >= 90) {
                    return "ege: 😤 Nur noch 10 bis ich platze! Hör endlich auf!";
                }
                if (score >= 80) {
                    return "ege: 💢 Noch 20, dann passiert was Schlimmes! Du nervst!";
                }
                if (score >= 70) {
                    return "ege: 😠 Noch 30 … Ich hab doch schon ‚Stopp‘ gesagt!";
                }
                if (score >= 60) {
                    return "ege: 😒 Langsam wird’s unangenehm. Noch 40 bis zum Platzen.";
                }
                if (score >= 50) {
                    return "ege: 😑 So, ich bin satt. Du kannst jetzt aufhören. Wirklich.";
                }
                if (score >= 40) {
                    return "ege: 🙂 Noch 10 bis ich satt bin! Weiter so!";
                }
                if (score >= 30) {
                    return "ege: 😋 Schon 30! Noch 20 bis satt.";
                }
                if (score >= 20) {
                    return "ege: 👍 20 geschafft! Noch 30 bis zur Sättigung.";
                }
                if (score >= 10) {
                    return "ege: 😊 Schon 10! Fütter weiter!";
                }
                // 0 – 9
                return "ege: 😃 Hey, ich bin ege! Fütter mich!";
            }

            // Setzt die Sprechblase und das Emoji entsprechend dem aktuellen Score
            function updateMessageAndEmoji() {
                if (currentScore >= MAX_SCORE) {
                    pandaEmoji.textContent = "💥";
                    messageSpan.textContent = getMessageForMilestone(currentScore);
                    winContainer.innerHTML = '<div class="win-message">😵 ege ist geplatzt! Neustart?</div>';
                } else {
                    pandaEmoji.textContent = "🐼";
                    winContainer.innerHTML = '';
                    messageSpan.textContent = getMessageForMilestone(currentScore);
                }
            }

            // UI: Punktestand aktualisieren
            function updateScoreUI() {
                scoreDisplay.textContent = `${currentScore} / ${MAX_SCORE}`;
            }

            // Prüft, ob ein neuer Meilenstein (10er-Schritt) erreicht wurde, und aktualisiert ggf. die Nachricht
            function checkMilestoneAndUpdate() {
                let milestone = Math.floor(currentScore / 10) * 10; // 0, 10, 20, ..., 100
                // Bei 100 soll die Explosion auch als neuer Meilenstein gelten
                if (milestone > lastMilestone || (currentScore >= MAX_SCORE && lastMilestone < MAX_SCORE)) {
                    lastMilestone = milestone;
                    updateMessageAndEmoji();
                }
                // Spezialfall: Bei 100 wird lastMilestone = 100, danach keine weiteren Updates.
            }

            // ---------- Explosion / Game Over ----------
            function explodePanda() {
                gameActive = false;
                // Alle Bambus-Timeouts löschen
                for (let i = 0; i < bambooTimeouts.length; i++) {
                    if (bambooTimeouts[i]) {
                        clearTimeout(bambooTimeouts[i]);
                        bambooTimeouts[i] = null;
                    }
                }
                // Alle Bambusse sichtbar machen (für den letzten Look)
                bambooElements.forEach(b => b.classList.remove('hidden'));
                // Nachricht und Emoji final setzen (wird auch durch checkMilestone... gemacht)
                checkMilestoneAndUpdate();
                updateScoreUI();
            }

            // Punktestand erhöhen (bei Klick)
            function increaseScore() {
                if (!gameActive) return;
                if (currentScore >= MAX_SCORE) return;

                currentScore++;

                // Prüfen, ob ein neuer Meilenstein erreicht wurde (10er-Schritte)
                checkMilestoneAndUpdate();

                // Bei Erreichen von 100: Explosion auslösen
                if (currentScore >= MAX_SCORE) {
                    explodePanda();  // setzt gameActive false und aktualisiert UI
                }

                updateScoreUI();  // Punktestand immer aktualisieren
            }

            // ---------- Bambus-Klick ----------
            function onBambooClick(event) {
                const bamboo = event.currentTarget;
                if (!gameActive) return;
                if (currentScore >= MAX_SCORE) return;
                if (bamboo.classList.contains('hidden')) return;

                const index = parseInt(bamboo.dataset.index, 10);

                // Score erhöhen (löst ggf. Meilenstein-Update aus)
                increaseScore();

                // Bambus verschwinden lassen
                bamboo.classList.add('hidden');

                // Vorherigen Timeout löschen
                if (bambooTimeouts[index]) {
                    clearTimeout(bambooTimeouts[index]);
                }

                // Neuen Timeout zum Wiedereinblenden (1 Sekunde)
                bambooTimeouts[index] = setTimeout(() => {
                    if (gameActive && currentScore < MAX_SCORE) {
                        bamboo.classList.remove('hidden');
                    }
                    bambooTimeouts[index] = null;
                }, 1000);
            }

            // ---------- Reset ----------
            function resetGame() {
                // Alle Timeouts abbrechen
                for (let i = 0; i < bambooTimeouts.length; i++) {
                    if (bambooTimeouts[i]) {
                        clearTimeout(bambooTimeouts[i]);
                        bambooTimeouts[i] = null;
                    }
                }

                // Bambusse wieder sichtbar
                bambooElements.forEach(b => b.classList.remove('hidden'));

                // Zustand zurücksetzen
                currentScore = 0;
                gameActive = true;
                lastMilestone = -1;   // damit die Startnachricht beim nächsten check erscheint

                // UI aktualisieren (setzt auch die Startnachricht)
                pandaEmoji.textContent = "🐼";
                winContainer.innerHTML = '';
                updateScoreUI();
                // Erzwinge die Anfangsnachricht (Meilenstein 0)
                lastMilestone = -1; // sicherstellen
                checkMilestoneAndUpdate(); // setzt Nachricht auf "Hey, ich bin ege..."
            }

            // ---------- Event-Listener ----------
            bambooElements.forEach((bamboo, idx) => {
                bamboo.dataset.index = idx;
                bamboo.addEventListener('click', onBambooClick);
                bamboo.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        bamboo.click();
                    }
                });
            });

            document.getElementById('resetGameBtn').addEventListener('click', resetGame);

            // Initialisierung: Startnachricht anzeigen
            resetGame(); // setzt alles auf Anfang
        })();
    </script>
</body>
</html>
