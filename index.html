<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waifu Clicker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #ffdde1 0%, #ee9ca7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
            touch-action: manipulation;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 4px 12px rgba(255, 200, 220, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #4a1e2b;
            text-shadow: 3px 3px 0 #ffc2d9, 5px 5px 0 rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            word-break: break-word;
        }

        .points-panel {
            background: rgba(253, 227, 237, 0.8);
            border-radius: 80px;
            padding: 18px 24px;
            margin: 16px 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 3px solid white;
            box-shadow: inset 0 2px 8px #ffb6c1, 0 10px 10px rgba(150, 60, 80, 0.2);
        }

        .heart-display {
            font-size: 2.2rem;
            font-weight: bold;
            background: white;
            padding: 10px 28px;
            border-radius: 60px;
            color: #b23b5c;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 0 #b23b5c;
            flex: 1 1 auto;
            justify-content: center;
        }

        .heart-display span {
            font-size: 2.8rem;
            line-height: 1;
        }

        .stats {
            font-size: 1.5rem;
            background: #ffe6f0;
            padding: 10px 20px;
            border-radius: 40px;
            color: #811e3c;
            font-weight: 600;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-item i {
            font-size: 1.8rem;
        }

        /* Waifu Klickbereich */
        .waifu-click-area {
            display: flex;
            justify-content: center;
            margin: 24px 0 28px;
            filter: drop-shadow(0 20px 15px #b23b5c);
        }

        .waifu-button {
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            transition: transform 0.1s ease;
            touch-action: manipulation;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            max-width: 280px;
            width: 70vw;
            height: auto;
            aspect-ratio: 1/1;
        }

        .waifu-button:active {
            transform: scale(0.92);
        }

        .waifu-svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            background: #ffe0f0;
            box-shadow: 0 18px 0 #b23b5c, 0 0 0 6px white, 0 0 0 10px #ffb8d2;
        }

        /* Upgrades Bereich */
        .upgrades-title {
            font-size: 1.9rem;
            font-weight: 600;
            color: #3f1723;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,240,0.5);
            padding: 8px 20px;
            border-radius: 50px;
            backdrop-filter: blur(2px);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }

        .upgrade-card {
            background: #fff0f5;
            border: 4px solid white;
            border-radius: 40px;
            padding: 22px 12px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 12px 0 #b23b5c, 0 8px 12px rgba(0,0,0,0.2);
            transition: all 0.05s linear;
            touch-action: manipulation;
        }

        .upgrade-card:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #b23b5c, 0 8px 12px rgba(0,0,0,0.1);
        }

        .upgrade-emoji {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 6px;
            filter: drop-shadow(2px 4px 4px #c06a8a);
        }

        .upgrade-name {
            font-size: 1.7rem;
            font-weight: 700;
            color: #2f1120;
            margin-bottom: 4px;
        }

        .upgrade-desc {
            font-size: 1.3rem;
            background: #ffdaec;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 600;
            color: #911f47;
            margin: 10px 0 4px;
        }

        .upgrade-price {
            font-size: 2rem;
            font-weight: 800;
            background: white;
            padding: 6px 24px;
            border-radius: 50px;
            margin: 12px 0 4px;
            color: #b23b5c;
            border: 2px solid #ff96b9;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .upgrade-price span {
            font-size: 2rem;
        }

        button.upgrade-btn {
            background: #ffacc7;
            border: none;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 14px 28px;
            margin-top: 10px;
            color: #2f0f1a;
            width: 100%;
            border: 3px solid white;
            box-shadow: 0 6px 0 #9f4465;
            transition: all 0.05s;
            touch-action: manipulation;
            cursor: pointer;
        }

        button.upgrade-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #9f4465;
        }

        button.upgrade-btn:disabled {
            opacity: 0.5;
            filter: grayscale(0.5);
            pointer-events: none;
            transform: none;
            box-shadow: 0 6px 0 #6b3b4b;
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #511e2e;
            font-weight: 600;
            font-size: 1.3rem;
        }

        /* mobile optimierungen */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .heart-display { font-size: 1.8rem; padding: 8px 16px; }
            .stats { font-size: 1.2rem; gap: 12px; }
            .upgrade-name { font-size: 1.4rem; }
            .upgrade-price { font-size: 1.6rem; padding: 4px 16px; }
            button.upgrade-btn { font-size: 1.5rem; padding: 10px 16px; }
        }
    </style>
    <!-- Font Awesome für Icons (optional, nur für Herzchen) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <h1>✨WAIFU CLICKER✨</h1>

        <!-- Punkte und Stats -->
        <div class="points-panel">
            <div class="heart-display">
                <span>❤️</span>
                <span id="pointsDisplay">0</span>
            </div>
            <div class="stats">
                <div class="stat-item"><i class="fas fa-fingerprint"></i> <span id="perClickDisplay">1</span></div>
                <div class="stat-item"><i class="fas fa-clock"></i> <span id="perSecDisplay">0</span></div>
            </div>
        </div>

        <!-- WAIFU - KLICKBEREICH -->
        <div class="waifu-click-area">
            <button class="waifu-button" id="waifuClickBtn">
                <!-- Einfaches SVG Waifu-Gesicht (rund, Mädchen) -->
                <svg class="waifu-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Hintergrund (Haut) -->
                    <circle cx="50" cy="50" r="46" fill="#FFDFC4" stroke="#FFB6C1" stroke-width="3"/>
                    <!-- Augen -->
                    <circle cx="35" cy="40" r="8" fill="white"/>
                    <circle cx="65" cy="40" r="8" fill="white"/>
                    <circle cx="37" cy="42" r="4" fill="#482E1E"/>
                    <circle cx="63" cy="42" r="4" fill="#482E1E"/>
                    <!-- Pupillenlicht -->
                    <circle cx="34" cy="39" r="1.5" fill="white"/>
                    <circle cx="60" cy="39" r="1.5" fill="white"/>
                    <!-- Mund (lächeln) -->
                    <path d="M35 60 Q50 70, 65 60" stroke="#D64F7A" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <!-- Wangenrot -->
                    <circle cx="28" cy="50" r="6" fill="#FFA5B4" opacity="0.5"/>
                    <circle cx="72" cy="50" r="6" fill="#FFA5B4" opacity="0.5"/>
                    <!-- Haarschleife -->
                    <path d="M50 18 L44 8 L56 8 L50 18" fill="#FF80B0" stroke="white" stroke-width="2"/>
                    <circle cx="50" cy="14" r="6" fill="#FFB3D1" stroke="white" stroke-width="2"/>
                </svg>
            </button>
        </div>

        <!-- UPGRADES -->
        <div class="upgrades-title">
            <i class="fas fa-gift"></i>  Upgrades  <i class="fas fa-gift"></i>
        </div>
        <div class="upgrades-grid">
            <!-- Klick-Upgrade -->
            <div class="upgrade-card" id="upgradeClickCard">
                <div class="upgrade-emoji">⚡💘</div>
                <div class="upgrade-name">Stärkere Liebe</div>
                <div class="upgrade-desc">+1❤️ pro Klick</div>
                <div class="upgrade-price"><span>❤️</span> <span id="clickPriceDisplay">20</span></div>
                <button class="upgrade-btn" id="buyClickUpgrade">Kaufen</button>
            </div>

            <!-- Auto-Upgrade (Autoklicker) -->
            <div class="upgrade-card" id="upgradeAutoCard">
                <div class="upgrade-emoji">⏰💞</div>
                <div class="upgrade-name">Autolove</div>
                <div class="upgrade-desc">+1❤️/Sekunde</div>
                <div class="upgrade-price"><span>❤️</span> <span id="autoPriceDisplay">10</span></div>
                <button class="upgrade-btn" id="buyAutoUpgrade">Kaufen</button>
            </div>
        </div>

        <div class="footer-note">drück die Waifu!  (◕‿◕)</div>
    </div>

    <script>
        (function() {
            // ---------- SPIELVARIABLEN ----------
            let points = 0;
            let pointsPerClick = 1;
            let autoClickerLevel = 0;       // Anzahl Autoklicker
            let clickUpgradeLevel = 0;       // für Anzeige / Preisberechnung

            // Basispreise (steigen mit Level)
            const BASE_CLICK_PRICE = 20;
            const BASE_AUTO_PRICE = 10;

            // UI Elemente
            const pointsDisplay = document.getElementById('pointsDisplay');
            const perClickDisplay = document.getElementById('perClickDisplay');
            const perSecDisplay = document.getElementById('perSecDisplay');
            const clickPriceSpan = document.getElementById('clickPriceDisplay');
            const autoPriceSpan = document.getElementById('autoPriceDisplay');
            const waifuBtn = document.getElementById('waifuClickBtn');
            const buyClickBtn = document.getElementById('buyClickUpgrade');
            const buyAutoBtn = document.getElementById('buyAutoUpgrade');

            // Hilfsfunktion: Preise berechnen
            function getClickUpgradePrice() {
                return BASE_CLICK_PRICE * (clickUpgradeLevel + 1);
            }

            function getAutoUpgradePrice() {
                return BASE_AUTO_PRICE * (autoClickerLevel + 1);
            }

            // UI komplett aktualisieren
            function updateUI() {
                // Punkte anzeigen (Ganzzahl, aber runden wir einfach)
                pointsDisplay.textContent = Math.floor(points);

                // Pro Klick Anzeige
                perClickDisplay.textContent = pointsPerClick;

                // Pro Sekunde Anzeige (durch Autoklicker)
                perSecDisplay.textContent = autoClickerLevel; // 1 pro Sekunde pro Level

                // Preise anzeigen
                clickPriceSpan.textContent = getClickUpgradePrice();
                autoPriceSpan.textContent = getAutoUpgradePrice();

                // Buttons deaktivieren wenn nicht genug Punkte
                buyClickBtn.disabled = points < getClickUpgradePrice();
                buyAutoBtn.disabled = points < getAutoUpgradePrice();
            }

            // Klick auf Waifu
            function handleWaifuClick(e) {
                e.preventDefault();
                points += pointsPerClick;
                updateUI();

                // Kurzes Vibration-Feedback (falls mobil unterstützt)
                if (navigator.vibrate) navigator.vibrate(20);
            }

            // Klick-Upgrade kaufen
            function buyClickUpgrade() {
                const price = getClickUpgradePrice();
                if (points < price) return;

                points -= price;
                clickUpgradeLevel++;
                pointsPerClick++; // +1 pro Klick

                // kleines Feedback
                if (navigator.vibrate) navigator.vibrate(30);

                updateUI();
            }

            // Auto-Upgrade kaufen
            function buyAutoUpgrade() {
                const price = getAutoUpgradePrice();
                if (points < price) return;

                points -= price;
                autoClickerLevel++;

                if (navigator.vibrate) navigator.vibrate(30);

                updateUI();
            }

            // Autoklicker-Logik: Jede Sekunde Punkte hinzufügen
            function autoClickerTick() {
                if (autoClickerLevel > 0) {
                    points += autoClickerLevel; // 1 Punkt pro Level pro Sekunde
                    updateUI();
                }
            }

            // Event-Listener
            waifuBtn.addEventListener('click', handleWaifuClick);
            waifuBtn.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false }); // Doppelklick-Zoom vermeiden

            buyClickBtn.addEventListener('click', buyClickUpgrade);
            buyAutoBtn.addEventListener('click', buyAutoUpgrade);

            // Touch-Geräte: aktives Verhalten unterbinden (kein Zoom)
            const allButtons = [waifuBtn, buyClickBtn, buyAutoBtn];
            allButtons.forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // Verhindert doppeltes Zoomen
                }, { passive: false });
            });

            // Starte Intervall für Autoklicker (alle 1000 ms)
            setInterval(autoClickerTick, 1000);

            // UI initialisieren
            updateUI();

            // Optional: Punkte bei jedem Update runden, aber wir lassen sie float (trotzdem schön anzeigen)
            // Kein localStorage diesmal, aber Spiel startet bei 0.

            // kleiner Hinweis im console
            console.log('Waifu Clicker geladen! Klicke die Waifu.');
        })();
    </script>
</body>
</html>
